# ============================================================
# Конфигурация тестов (Owner)
# Переопределение: -Dkey=value или переменные окружения KEY
# ============================================================

# --- Базовый URL ---
baseUrl = https://www.consultant.ru/cons/

# --- Браузер ---
# CHROME | EDGE | FIREFOX | REMOTE_CHROME | REMOTE_EDGE | REMOTE_FIREFOX
browser = CHROME

# --- Версия браузера (опционально) ---
browserVersion =

# --- Путь к бинарнику браузера (опционально) ---
# Если пусто и browserBinaryAutoDetect=true — BrowserBinaryResolver
browserBinaryPath =
browserBinaryAutoDetect = true

# --- Размер окна (ширина x высота) ---
browserSize = 1920x1080

# --- Headless-режим ---
headless = false

# --- Remote WebDriver (REMOTE_* браузеры) ---
remoteUrl = http://localhost:4444/wd/hub

# --- Таймауты (секунды) ---
timeout.seconds = 15
pageLoad.timeout.seconds = 60
script.timeout.seconds = 30
implicit.wait.seconds = 0

# --- Ретраи при падении теста (инфраструктурные/ flaky) ---
retryCount = 0

# --- Параллельный запуск (JUnit 5) ---
# Локально: false, CI: -Dparallel.enabled=true -Dparallel.threads=4
parallel.enabled = false
parallel.threads = 2
